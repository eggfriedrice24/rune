name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: fmt, lint, typecheck, test, build
    runs-on: ubuntu-22.04
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: install dependencies
        run: bun install --frozen-lockfile

      - name: check formatting
        run: bun fmt:check

      - name: lint
        run: bun lint

      - name: typecheck
        run: bun typecheck

      - name: test
        run: bun run test

      - name: build
        run: bun run build
